<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">v2 workspace workflow</title>
  <desc id="desc">A diagram showing the v2 workspace workflow from template selection through documents, analysis, review, reports, and exports.</desc>
  <rect width="1200" height="680" fill="#f8fafc"/>
  <rect x="48" y="44" width="1104" height="592" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="84" y="104" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Enterprise RAG v2.0 Workspace Workflow</text>
  <text x="84" y="140" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Workspace is the top-level project boundary for documents, AI analysis, review, and formal reports.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .card { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; }
      .title { font: 700 20px Inter, Arial, sans-serif; fill: #0f172a; }
      .body { font: 15px Inter, Arial, sans-serif; fill: #475569; }
      .small { font: 13px Inter, Arial, sans-serif; fill: #64748b; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="card" x="84" y="198" width="200" height="116" rx="12"/>
  <text class="title" x="108" y="235">1. Workspace</text>
  <text class="body" x="108" y="264">Create project</text>
  <text class="small" x="108" y="288">Owner, members, roles</text>

  <rect class="card" x="364" y="198" width="200" height="116" rx="12"/>
  <text class="title" x="388" y="235">2. Template</text>
  <text class="body" x="388" y="264">Choose workflow</text>
  <text class="small" x="388" y="288">Directories, tasks, report</text>

  <rect class="card" x="644" y="198" width="200" height="116" rx="12"/>
  <text class="title" x="668" y="235">3. Documents</text>
  <text class="body" x="668" y="264">Upload and chunk</text>
  <text class="small" x="668" y="288">Workspace-scoped RAG</text>

  <rect class="card" x="924" y="198" width="200" height="116" rx="12"/>
  <text class="title" x="948" y="235">4. Analysis</text>
  <text class="body" x="948" y="264">Run AI tasks</text>
  <text class="small" x="948" y="288">JSON output + citations</text>

  <line class="arrow" x1="284" y1="256" x2="352" y2="256"/>
  <line class="arrow" x1="564" y1="256" x2="632" y2="256"/>
  <line class="arrow" x1="844" y1="256" x2="912" y2="256"/>

  <rect class="card" x="224" y="420" width="220" height="116" rx="12"/>
  <text class="title" x="248" y="457">5. Review</text>
  <text class="body" x="248" y="486">Approve, edit, reject</text>
  <text class="small" x="248" y="510">Original AI snapshot kept</text>

  <rect class="card" x="504" y="420" width="220" height="116" rx="12"/>
  <text class="title" x="528" y="457">6. Report</text>
  <text class="body" x="528" y="486">Use approved content</text>
  <text class="small" x="528" y="510">Ordered Markdown sections</text>

  <rect class="card" x="784" y="420" width="220" height="116" rx="12"/>
  <text class="title" x="808" y="457">7. Export</text>
  <text class="body" x="808" y="486">Markdown, DOCX, PDF</text>
  <text class="small" x="808" y="510">Stored by workspace ID</text>

  <path class="arrow" d="M1024 314 C1024 380 334 356 334 408"/>
  <line class="arrow" x1="444" y1="478" x2="492" y2="478"/>
  <line class="arrow" x1="724" y1="478" x2="772" y2="478"/>

  <rect x="84" y="574" width="1040" height="34" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="104" y="596" font-family="Inter, Arial, sans-serif" font-size="15" fill="#1e3a8a">Isolation rule: every knowledge base, document, chunk, conversation, analysis result, review decision, report, and export is resolved through workspace_id.</text>
</svg>
