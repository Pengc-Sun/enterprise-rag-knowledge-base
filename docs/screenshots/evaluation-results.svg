<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Evaluation Results</title>
  <desc id="desc">Retrieval metric comparison for synthetic Day 54 prediction file.</desc>
  <style>
    .bg { fill: #f7f9fc; } .panel { fill: #ffffff; stroke: #d8dee9; stroke-width: 1.5; } .title { fill: #111827; font: 700 42px Arial, sans-serif; }
    .subtitle { fill: #4b5563; font: 400 22px Arial, sans-serif; } .head { fill: #374151; font: 700 18px Arial, sans-serif; } .cell { fill: #111827; font: 400 22px Arial, sans-serif; }
    .row { fill: #ffffff; stroke: #d8dee9; stroke-width: 1.2; } .badge { fill: #dcfce7; stroke: #86efac; } .badgeText { fill: #166534; font: 700 18px Arial, sans-serif; }
  </style>
  <rect width="1280" height="820" class="bg"/>
  <rect x="44" y="80" width="1192" height="670" rx="14" class="panel"/>
  <text x="90" y="145" class="title">Evaluation Results</text>
  <text x="90" y="184" class="subtitle">Synthetic retrieval predictions evaluated against 40 labelled enterprise questions.</text>
  <rect x="90" y="205" width="290" height="40" rx="20" class="badge"/>
  <text x="112" y="231" class="badgeText">Generated by run_retrieval_evaluation.py</text>
  <text x="120" y="260" class="head">Strategy</text>
  <text x="390" y="260" class="head">Hit@1</text>
  <text x="555" y="260" class="head">MRR@1</text>
  <text x="720" y="260" class="head">Hit@5</text>
  <text x="885" y="260" class="head">MRR@5</text>
  <text x="1050" y="260" class="head">nDCG@5</text>
  <rect x="90" y="238" width="1100" height="64" rx="8" class="row"/><text x="120" y="280" class="cell">vector</text><text x="390" y="280" class="cell">0.750</text><text x="555" y="280" class="cell">0.750</text><text x="720" y="280" class="cell">1.000</text><text x="885" y="280" class="cell">0.812</text><text x="1050" y="280" class="cell">0.858</text><rect x="90" y="320" width="1100" height="64" rx="8" class="row"/><text x="120" y="362" class="cell">hybrid</text><text x="390" y="362" class="cell">0.900</text><text x="555" y="362" class="cell">0.900</text><text x="720" y="362" class="cell">1.000</text><text x="885" y="362" class="cell">0.933</text><text x="1050" y="362" class="cell">0.950</text><rect x="90" y="402" width="1100" height="64" rx="8" class="row"/><text x="120" y="444" class="cell">hybrid_reranker</text><text x="390" y="444" class="cell">1.000</text><text x="555" y="444" class="cell">1.000</text><text x="720" y="444" class="cell">1.000</text><text x="885" y="444" class="cell">1.000</text><text x="1050" y="444" class="cell">1.000</text>
  <text x="90" y="640" class="subtitle">Result: hybrid retrieval improves top-rank hit rate, and the reranker places expected evidence first in this demo file.</text>
</svg>