<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">System Architecture</title>
  <desc id="desc">Full-stack RAG application components and service boundaries.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker></defs>
  <style>
    .bg { fill: #f7f9fc; } .title { fill: #111827; font: 700 38px Arial, sans-serif; } .subtitle { fill: #4b5563; font: 400 20px Arial, sans-serif; }
    .node { fill: #ffffff; stroke: #c8d3e3; stroke-width: 1.5; } .nodeTitle { fill: #111827; font: 700 21px Arial, sans-serif; } .nodeLine { fill: #4b5563; font: 400 17px Arial, sans-serif; }
    .edge { stroke: #2563eb; stroke-width: 2.3; } .edgeLabel { fill: #1d4ed8; font: 700 14px Arial, sans-serif; }
  </style>
  <rect width="1280" height="820" class="bg"/>
  <text x="60" y="70" class="title">System Architecture</text>
  <text x="60" y="104" class="subtitle">Full-stack RAG application components and service boundaries.</text>
  <line x1="200.0" y1="260" x2="640.0" y2="150" class="edge" marker-end="url(#arrow)"/><text x="430.0" y="197.0" class="edgeLabel">HTTP + SSE</text><line x1="640.0" y1="260" x2="1080.0" y2="150" class="edge" marker-end="url(#arrow)"/><text x="870.0" y="197.0" class="edgeLabel">provider calls</text><line x1="640.0" y1="260" x2="445.0" y2="430" class="edge" marker-end="url(#arrow)"/><text x="552.5" y="337.0" class="edgeLabel">SQLAlchemy async</text><line x1="640.0" y1="260" x2="815.0" y2="430" class="edge" marker-end="url(#arrow)"/><text x="737.5" y="337.0" class="edgeLabel">uploads</text><line x1="640.0" y1="260" x2="1100.0" y2="430" class="edge" marker-end="url(#arrow)"/><text x="880.0" y="337.0" class="edgeLabel">health dependency</text>
  <rect x="70" y="150" width="260" height="110" rx="12" class="node"/><text x="94" y="188" class="nodeTitle">React Frontend</text><text x="94" y="222" class="nodeLine">Auth routes</text><text x="94" y="248" class="nodeLine">KB, docs, chat UI</text><rect x="510" y="150" width="260" height="110" rx="12" class="node"/><text x="534" y="188" class="nodeTitle">FastAPI Backend</text><text x="534" y="222" class="nodeLine">API v1 routes</text><text x="534" y="248" class="nodeLine">SSE streaming</text><rect x="950" y="150" width="260" height="110" rx="12" class="node"/><text x="974" y="188" class="nodeTitle">Provider Layer</text><text x="974" y="222" class="nodeLine">Embeddings</text><text x="974" y="248" class="nodeLine">Reranker, LLM</text><rect x="295" y="430" width="300" height="120" rx="12" class="node"/><text x="319" y="468" class="nodeTitle">PostgreSQL + pgvector</text><text x="319" y="502" class="nodeLine">Users, KBs, docs</text><text x="319" y="528" class="nodeLine">Chunks and vectors</text><rect x="685" y="430" width="260" height="120" rx="12" class="node"/><text x="709" y="468" class="nodeTitle">File Storage</text><text x="709" y="502" class="nodeLine">Uploaded files</text><text x="709" y="528" class="nodeLine">Knowledge-base folders</text><rect x="1010" y="430" width="180" height="120" rx="12" class="node"/><text x="1034" y="468" class="nodeTitle">Redis</text><text x="1034" y="502" class="nodeLine">Service dependency</text><text x="1034" y="528" class="nodeLine">Future cache/queue</text>
</svg>